<!DOCTYPE html>
<html>
<head>

<title>SUEZ HR AI Talent Screening</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

.header{
background:white;
padding:15px;
border-bottom:1px solid #ddd;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
color:#2c7be5;
}

.sidebar{
position:fixed;
left:0;
top:60px;
width:220px;
height:100%;
background:#2c7be5;
color:white;
padding:20px;
}

.sidebar h3{
margin-top:0;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:10px 0;
}

.main{
margin-left:240px;
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
margin-bottom:25px;
}

button{
padding:12px 20px;
background:#2c7be5;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1a5fd1;
}

input{
padding:10px;
width:100%;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

table{
border-collapse:collapse;
width:100%;
font-size:13px;
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:left;
}

th{
background:#f2f2f2;
}

#result{
overflow-x:auto;
}

.login{
max-width:400px;
margin:auto;
margin-top:150px;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div id="loginPage" class="login">

<h2>SUEZ HR Portal Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>


<div id="app" style="display:none">

<div class="header">

<div class="logo">SUEZ HR AI Screening</div>

<div>Welcome HR User</div>

</div>

<div class="sidebar">

<h3>Navigation</h3>

<a href="#">Dashboard</a>
<a href="#">Upload Candidates</a>
<a href="#">Results</a>
<a href="#">Analytics</a>
<a href="#" onclick="logout()">Logout</a>

</div>

<div class="main">

<div class="card">

<h3>Upload Job Description</h3>

<input type="file" id="job_description">

<h3>Upload Candidate Resumes</h3>

<input type="file" id="resume" multiple>

<button id="submitBtn">Analyze Candidates</button>

<button onclick="downloadExcel()">Download Excel</button>

</div>

<div class="card">

<h3>Candidate Evaluation Results</h3>

<div id="result"></div>

</div>

</div>

</div>

<script>

let tableData=[];

function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(user==="admin" && pass==="admin123"){

document.getElementById("loginPage").style.display="none";
document.getElementById("app").style.display="block";

}else{

alert("Invalid Login");

}

}

function logout(){

location.reload();

}

document.getElementById("submitBtn").addEventListener("click", async ()=>{

const jd=document.getElementById("job_description").files[0];
const resumes=document.getElementById("resume").files;

if(!jd || resumes.length===0){

alert("Upload JD and resumes");
return;

}

const formData=new FormData();

formData.append("job_description",jd);

for(let i=0;i<resumes.length;i++){

formData.append("resume",resumes[i]);

}

const response=await fetch("https://suezppl.app.n8n.cloud/webhook/9fdb5c11-569d-4f29-acd2-db49248a700c",{
method:"POST",
body:formData
});

let data=await response.json();

if(!Array.isArray(data)){
data=[data];
}

tableData=data;

let table=`<table><tr>

<th>Name</th>
<th>Gender</th>
<th>Education</th>
<th>Current Company</th>
<th>Current Designation</th>
<th>Total Experience</th>
<th>Relevance Experience</th>
<th>Key Skills</th>

</tr>`;

data.forEach(c=>{

table+=`<tr>

<td>${c["Name"]||""}</td>
<td>${c["Gender"]||""}</td>
<td>${c["Education"]||""}</td>
<td>${c["Current Company"]||""}</td>
<td>${c["Current Designation"]||""}</td>
<td>${c["Total Working Experience"]||""}</td>
<td>${c["Relevance Experience"]||""}</td>
<td>${c["Key Skills"]||""}</td>

</tr>`;

});

table+="</table>";

document.getElementById("result").innerHTML=table;

});


function downloadExcel(){

if(tableData.length===0){
alert("No results");
return;
}

const worksheet=XLSX.utils.json_to_sheet(tableData);

const workbook=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(workbook,worksheet,"Candidates");

XLSX.writeFile(workbook,"SUEZ_AI_Candidate_Screening.xlsx");

}

</script>

</body>
</html>
