<!DOCTYPE html>

<html>

<head>
<title>AI Resume Screening Portal</title>

<style>
body{
font-family: Arial;
margin:40px;
background:#f5f6fa;
}

.container{
max-width:700px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

button{
padding:12px 22px;
background:#2c7be5;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

#result{
margin-top:30px;
padding:20px;
border:1px solid #ddd;
border-radius:8px;
display:none;
}
</style>

</head>

<body>

<h2>AI Resume Screening Portal</h2>

<div class="container">

<label><b>Upload Job Description</b></label><br> <input type="file" id="job_description"><br><br>

<label><b>Upload Resume</b></label><br> <input type="file" id="resume"><br><br>

<button id="submitBtn">Evaluate Candidate</button>

<div id="result"></div>

</div>

<script>

document.getElementById("submitBtn").addEventListener("click", async () => {

console.log("Button clicked");

const jd = document.getElementById("job_description").files[0];
const resume = document.getElementById("resume").files[0];

if(!jd || !resume){
alert("Please upload both files");
return;
}

const formData = new FormData();
formData.append("job_description", jd);
formData.append("resume", resume);

console.log("Sending request...");

const response = await fetch(
"https://suezppl.app.n8n.cloud/webhook/9fdb5c11-569d-4f29-acd2-db49248a700c",
{
method:"POST",
body:formData
});

const data = await response.json();

document.getElementById("result").style.display="block";
document.getElementById("result").innerHTML = JSON.stringify(data,null,2);

});

</script>

</body>
</html>
