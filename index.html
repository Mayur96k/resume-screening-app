<!DOCTYPE html>
<html>

<head>
<title>AI Resume Screening Portal</title>

<style>
body{
font-family: Arial;
margin:40px;
background:#f5f6fa;
}

.container{
max-width:700px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

button{
padding:12px 22px;
background:#2c7be5;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

#result{
margin-top:30px;
padding:20px;
border:1px solid #ddd;
border-radius:8px;
display:none;
}

table{
border-collapse:collapse;
width:100%;
}

th,td{
border:1px solid #ddd;
padding:8px;
font-size:13px;
}

th{
background:#f2f2f2;
}
</style>

</head>

<body>

<h2>AI Resume Screening Portal</h2>

<div class="container">

<label><b>Upload Job Description</b></label><br>
<input type="file" id="job_description"><br><br>

<label><b>Upload Resume(s)</b></label><br>
<input type="file" id="resume" multiple><br><br>

<button id="submitBtn">Evaluate Candidate</button>

<div id="result"></div>

</div>

<script>

document.getElementById("submitBtn").addEventListener("click", async () => {

console.log("Button clicked");

const jd = document.getElementById("job_description").files[0];
const resumes = document.getElementById("resume").files;

if(!jd || resumes.length === 0){
alert("Please upload JD and at least one resume");
return;
}

const formData = new FormData();

formData.append("job_description", jd);

/* Merge resumes under same field name */

for(let i=0;i<resumes.length;i++){
formData.append("resume", resumes[i]);
}

console.log("Sending request...");

const response = await fetch(
"https://suezppl.app.n8n.cloud/webhook/9fdb5c11-569d-4f29-acd2-db49248a700c",
{
method:"POST",
body:formData
});

let data = await response.json();

if(!Array.isArray(data)){
data = [data];
}

document.getElementById("result").style.display="block";

let table = `
<table>
<tr>
<th>Name</th>
<th>Gender</th>
<th>Education</th>
<th>Current Company</th>
<th>Current Designation</th>
<th>Total Working Experience</th>
<th>Relevance Experience</th>
<th>Key Skills</th>
<th>Similarity</th>
<th>Similarity 2</th>
</tr>
`;

data.forEach(candidate => {

table += `
<tr>
<td>${candidate["Name"] || ""}</td>
<td>${candidate["Gender"] || ""}</td>
<td>${candidate["Education"] || ""}</td>
<td>${candidate["Current Company"] || ""}</td>
<td>${candidate["Current Designation"] || ""}</td>
<td>${candidate["Total Working Experience"] || ""}</td>
<td>${candidate["Relevance Experience"] || ""}</td>
<td>${candidate["Key Skills"] || ""}</td>
<td>${candidate["Similarity"] || ""}</td>
<td>${candidate["Similarity 2"] || ""}</td>
</tr>
`;

});

table += "</table>";

document.getElementById("result").innerHTML = table;

});

</script>

</body>
</html>
