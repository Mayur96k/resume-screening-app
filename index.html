<!DOCTYPE html>
<html>
<head>

<title>AI Resume Screening Portal</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family: Arial;
background:#f5f6fa;
margin:0;
}

.header{
background:#2c7be5;
color:white;
padding:15px;
font-size:20px;
text-align:center;
}

.container{
max-width:1000px;
margin:auto;
margin-top:40px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
padding:10px;
width:100%;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:12px 22px;
background:#2c7be5;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-right:10px;
}

button:hover{
background:#1a5fd1;
}

#dashboard{
display:none;
}

#result{
margin-top:25px;
overflow-x:auto;
}

table{
border-collapse:collapse;
width:100%;
font-size:13px;
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:left;
}

th{
background:#f2f2f2;
}

.login-box{
max-width:400px;
margin:auto;
margin-top:120px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="header">AI Resume Screening Portal</div>

<!-- LOGIN PAGE -->

<div id="loginPage" class="login-box">

<h3>Login</h3>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<!-- DASHBOARD -->

<div id="dashboard" class="container">

<h3>Upload Job Description & Resumes</h3>

<label><b>Upload Job Description</b></label>
<input type="file" id="job_description">

<label><b>Upload Resume(s)</b></label>
<input type="file" id="resume" multiple>

<button id="submitBtn">Evaluate Candidate</button>

<button onclick="downloadExcel()">Download Excel</button>

<div id="result"></div>

</div>


<script>

let tableData = [];

function login(){

let user = document.getElementById("username").value;
let pass = document.getElementById("password").value;

/* simple demo authentication */

if(user === "admin" && pass === "admin123"){

document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").style.display="block";

}else{

alert("Invalid login");

}

}



document.getElementById("submitBtn").addEventListener("click", async () => {

const jd = document.getElementById("job_description").files[0];
const resumes = document.getElementById("resume").files;

if(!jd || resumes.length === 0){

alert("Please upload both files");
return;

}

const formData = new FormData();

formData.append("job_description", jd);

for(let i=0;i<resumes.length;i++){

formData.append("resume", resumes[i]);

}

const response = await fetch(
"https://suezppl.app.n8n.cloud/webhook/9fdb5c11-569d-4f29-acd2-db49248a700c",
{
method:"POST",
body:formData
});

let data = await response.json();

if(!Array.isArray(data)){
data=[data];
}

tableData = data;

let table = `
<table>
<tr>
<th>Name</th>
<th>Gender</th>
<th>Education</th>
<th>Current Company</th>
<th>Current Designation</th>
<th>Current Employement Tenure</th>
<th>Previous Employer</th>
<th>Previous Designation</th>
<th>Employement Tenure</th>
<th>Total Working Experience</th>
<th>Relevance Experience</th>
<th>Graduation</th>
<th>Specialisation</th>
<th>Post Graduate</th>
<th>Specialisation PG</th>
<th>Key Skills</th>
</tr>
`;

data.forEach(candidate => {

table += `
<tr>
<td>${candidate["Name"] || ""}</td>
<td>${candidate["Gender"] || ""}</td>
<td>${candidate["Education"] || ""}</td>
<td>${candidate["Current Company"] || ""}</td>
<td>${candidate["Current Designation"] || ""}</td>
<td>${candidate["Current Employement Tenure"] || ""}</td>
<td>${candidate["Previous Employer"] || ""}</td>
<td>${candidate["Previous Designation"] || ""}</td>
<td>${candidate["Employement Tenure"] || ""}</td>
<td>${candidate["Total Working Experience"] || ""}</td>
<td>${candidate["Relevance Experience"] || ""}</td>
<td>${candidate["Graduation"] || ""}</td>
<td>${candidate["Specialisation"] || ""}</td>
<td>${candidate["Post Graduate"] || ""}</td>
<td>${candidate["Specialisation PG"] || ""}</td>
<td>${candidate["Key Skills"] || ""}</td>
</tr>
`;

});

table += "</table>";

document.getElementById("result").innerHTML = table;

});



function downloadExcel(){

if(tableData.length === 0){

alert("No data to download");
return;

}

const worksheet = XLSX.utils.json_to_sheet(tableData);

const workbook = XLSX.utils.book_new();

XLSX.utils.book_append_sheet(workbook, worksheet, "Results");

XLSX.writeFile(workbook, "Candidate_Evaluation.xlsx");

}

</script>

</body>
</html>
