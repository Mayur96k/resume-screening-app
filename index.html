<!DOCTYPE html>
<html>
<head>
<title>AI Resume Screening Portal</title>

<style>

body{
font-family: Arial;
margin:40px;
background:#f5f6fa;
}

.container{
max-width:1100px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

button{
padding:12px 20px;
background:#2c7be5;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1a5fd1;
}

table{
margin-top:25px;
border-collapse:collapse;
width:100%;
font-size:13px;
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:left;
}

th{
background:#f2f2f2;
font-weight:bold;
}

</style>

</head>

<body>

<h2>AI Resume Screening Portal</h2>

<div class="container">

<form id="uploadForm" enctype="multipart/form-data">

<label><b>Upload Job Description</b></label><br>
<input type="file" name="job_description" accept=".pdf,.doc,.docx" required><br><br>

<label><b>Upload Candidate Resumes</b></label><br>
<input type="file" name="resume" accept=".pdf,.doc,.docx" multiple required><br><br>

<button type="submit">Evaluate Candidates</button>

</form>

<div id="result"></div>

</div>

<script>

document.getElementById("uploadForm").addEventListener("submit", async function(e){

e.preventDefault();

const formData = new FormData();

// Job Description
const jdFile = document.querySelector('input[name="job_description"]').files[0];
formData.append("job_description", jdFile);

// Multiple resumes
const resumes = document.querySelector('input[name="resume"]').files;

for(let i=0;i<resumes.length;i++){
formData.append("resume", resumes[i]);
}

const response = await fetch(
"https://suezppl.app.n8n.cloud/webhook/9fdb5c11-569d-4f29-acd2-db49248a700c",
{
method:"POST",
body:formData
});

const data = await response.json();

let table = `
<h3>Candidate Evaluation Result</h3>

<table>

<tr>
<th>Name</th>
<th>Gender</th>
<th>Education</th>
<th>Current Company</th>
<th>Current Designation</th>
<th>Current Employement Tenure</th>
<th>Previous Employer</th>
<th>Previous Designation</th>
<th>Employement Tenure</th>
<th>Total Working Experience</th>
<th>Relevance Experience</th>
<th>Graduation</th>
<th>Specialisation</th>
<th>Post Graduate</th>
<th>Specialisation PG</th>
<th>Key Skills</th>
<th>Similarity</th>
<th>Similarity 2</th>
</tr>
`;

data.forEach(candidate => {

table += `
<tr>
<td>${candidate["Name"] || ""}</td>
<td>${candidate["Gender"] || ""}</td>
<td>${candidate["Education"] || ""}</td>
<td>${candidate["Current Company"] || ""}</td>
<td>${candidate["Current Designation"] || ""}</td>
<td>${candidate["Current Employement Tenure"] || ""}</td>
<td>${candidate["Previous Employer"] || ""}</td>
<td>${candidate["Previous Designation"] || ""}</td>
<td>${candidate["Employement Tenure"] || ""}</td>
<td>${candidate["Total Working Experience"] || ""}</td>
<td>${candidate["Relevance Experience"] || ""}</td>
<td>${candidate["Graduation"] || ""}</td>
<td>${candidate["Specialisation"] || ""}</td>
<td>${candidate["Post Graduate"] || ""}</td>
<td>${candidate["Specialisation PG"] || ""}</td>
<td>${candidate["Key Skills"] || ""}</td>
<td>${candidate["Similarity"] || ""}</td>
<td>${candidate["Similarity 2"] || ""}</td>
</tr>
`;

});

table += "</table>";

document.getElementById("result").innerHTML = table;

});

</script>

</body>
</html>
