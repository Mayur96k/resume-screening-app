<!DOCTYPE html>

<html>
<head>
<title>AI Resume Screening Portal</title>

<style>
body{
font-family: Arial;
margin:40px;
}

.container{
max-width:700px;
padding:30px;
border:1px solid #ddd;
border-radius:10px;
}

button{
padding:10px 20px;
background:#2c7be5;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1a5fd1;
}

#result{
margin-top:30px;
padding:20px;
border:1px solid #ddd;
border-radius:8px;
display:none;
}
</style>

</head>

<body>

<h2>AI Resume Screening Portal</h2>

<div class="container">

<form id="uploadForm">

<label>Upload Job Description</label><br><br> <input type="file" name="job_description" required><br><br>

<label>Upload Resume</label><br><br> <input type="file" name="resume" required><br><br>

<button type="submit">Evaluate Candidate</button>

</form>

<div id="result"></div>

</div>

<script>

document.getElementById("uploadForm").addEventListener("submit", async function(e){

e.preventDefault();

const formData = new FormData(this);

const response = await fetch("https://suezppl.app.n8n.cloud/webhook/9fdb5c11-569d-4f29-acd2-db49248a700c",{
method:"POST",
body:formData
});

const data = await response.json();

let html = `
<h3>Candidate Evaluation Result</h3>
<p><b>Name:</b> ${data.Name}</p>
<p><b>Education:</b> ${data.Education}</p>
<p><b>Current Company:</b> ${data["Current Company"]}</p>
<p><b>Current Designation:</b> ${data["Current Designation"]}</p>
<p><b>Total Experience:</b> ${data["Total Working Experience"]}</p>
<p><b>Relevant Experience:</b> ${data["Relevance Experience"]}</p>
<p><b>Skills:</b> ${data["Key Skills"]}</p>
<p><b>Similarity Score:</b> ${data["Similarity"]}%</p>
`;

document.getElementById("result").innerHTML = html;
document.getElementById("result").style.display = "block";

});

</script>

</body>
</html>
