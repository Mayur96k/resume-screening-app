<!DOCTYPE html>

<html>

<head>
<title>AI Resume Screening Portal</title>

<style>
body{
font-family: Arial;
margin:40px;
background:#f5f6fa;
}

.container{
max-width:900px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

button{
padding:12px 22px;
background:#2c7be5;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1a5fd1;
}

#result{
margin-top:30px;
padding:20px;
border:1px solid #ddd;
border-radius:8px;
display:none;
overflow-x:auto;
}

table{
border-collapse:collapse;
width:100%;
font-size:13px;
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:left;
}

th{
background:#f2f2f2;
}
</style>

</head>

<body>

<h2>AI Resume Screening Portal</h2>

<div class="container">

<label><b>Upload Job Description</b></label><br> <input type="file" id="job_description"><br><br>

<label><b>Upload Resume</b></label><br> <input type="file" id="resume"><br><br>

<button id="submitBtn">Evaluate Candidate</button>

<div id="result"></div>

</div>

<script>

document.getElementById("submitBtn").addEventListener("click", async () => {

console.log("Button clicked");

const jd = document.getElementById("job_description").files[0];
const resume = document.getElementById("resume").files[0];

if(!jd || !resume){
alert("Please upload both files");
return;
}

const formData = new FormData();
formData.append("job_description", jd);
formData.append("resume", resume);

console.log("Sending request...");

const response = await fetch(
"https://suezppl.app.n8n.cloud/webhook/9fdb5c11-569d-4f29-acd2-db49248a700c",
{
method:"POST",
body:formData
});

let data = await response.json();

/* Ensure array format */
if(!Array.isArray(data)){
data=[data];
}

document.getElementById("result").style.display="block";

let table = `
<table>
<tr>
<th>Name</th>
<th>Gender</th>
<th>Education</th>
<th>Current Company</th>
<th>Current Designation</th>
<th>Current Employement Tenure</th>
<th>Previous Employer</th>
<th>Previous Designation</th>
<th>Employement Tenure</th>
<th>Total Working Experience</th>
<th>Relevance Experience</th>
<th>Graduation</th>
<th>Specialisation</th>
<th>Post Graduate</th>
<th>Specialisation PG</th>
<th>Key Skills</th>
</tr>
`;

data.forEach(candidate => {

table += `
<tr>
<td>${candidate["Name"] || ""}</td>
<td>${candidate["Gender"] || ""}</td>
<td>${candidate["Education"] || ""}</td>
<td>${candidate["Current Company"] || ""}</td>
<td>${candidate["Current Designation"] || ""}</td>
<td>${candidate["Current Employement Tenure"] || ""}</td>
<td>${candidate["Previous Employer"] || ""}</td>
<td>${candidate["Previous Designation"] || ""}</td>
<td>${candidate["Employement Tenure"] || ""}</td>
<td>${candidate["Total Working Experience"] || ""}</td>
<td>${candidate["Relevance Experience"] || ""}</td>
<td>${candidate["Graduation"] || ""}</td>
<td>${candidate["Specialisation"] || ""}</td>
<td>${candidate["Post Graduate"] || ""}</td>
<td>${candidate["Specialisation PG"] || ""}</td>
<td>${candidate["Key Skills"] || ""}</td>
</tr>
`;

});

table += "</table>";

document.getElementById("result").innerHTML = table;

});

</script>

</body>
</html>
