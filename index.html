<!DOCTYPE html>
<html>

<head>

<title>SUEZ AI HR Talent Platform</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

/* HEADER */

.header{
background:white;
padding:15px 30px;
border-bottom:1px solid #ddd;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
color:#2c7be5;
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:0;
top:60px;
width:220px;
height:100%;
background:#2c7be5;
color:white;
padding:20px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:10px 0;
}

/* MAIN */

.main{
margin-left:240px;
padding:30px;
}

/* CARDS */

.card{
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
margin-bottom:25px;
}

button{
padding:12px 20px;
background:#2c7be5;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1a5fd1;
}

input{
padding:10px;
width:100%;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

/* TABLE */

table{
border-collapse:collapse;
width:100%;
font-size:13px;
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:left;
}

th{
background:#f2f2f2;
}

.topCandidate{
background:#e6ffe6;
}

/* LOGIN */

.login{
max-width:400px;
margin:auto;
margin-top:150px;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* PROGRESS */

.progressBar{
width:100%;
background:#ddd;
border-radius:5px;
}

.progress{
height:20px;
width:0%;
background:#2c7be5;
border-radius:5px;
}

</style>

</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage" class="login">

<h2>SUEZ HR Portal</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>


<div id="app" style="display:none">

<div class="header">

<div class="logo">SUEZ AI Talent Platform</div>

<div>HR Dashboard</div>

</div>


<div class="sidebar">

<a>Dashboard</a>
<a>Candidate Upload</a>
<a>Results</a>
<a>Analytics</a>
<a onclick="logout()">Logout</a>

</div>


<div class="main">

<div class="card">

<h3>Upload Job Description</h3>

<input type="file" id="job_description">

<h3>Upload Resumes</h3>

<input type="file" id="resume" multiple>

<button id="submitBtn">Analyze Candidates</button>

<button onclick="downloadExcel()">Download Excel</button>

<div style="margin-top:20px">

<div id="status">Waiting...</div>

<div style="margin-top:10px">
Elapsed Time: <span id="timer">0</span> sec
</div>

<div class="progressBar">
<div id="progressBar" class="progress"></div>
</div>

</div>

</div>


<div class="card">

<h3>Candidate Similarity Chart</h3>

<canvas id="chart"></canvas>

</div>


<div class="card">

<h3>Candidate Results</h3>

<div id="result"></div>

</div>


</div>

</div>


<script>

let tableData=[]

function login(){

let u=document.getElementById("username").value
let p=document.getElementById("password").value

if(u==="admin" && p==="admin123"){

document.getElementById("loginPage").style.display="none"
document.getElementById("app").style.display="block"

}else{

alert("Invalid Login")

}

}

function logout(){

location.reload()

}

function updateProgress(p,t){

document.getElementById("progressBar").style.width=p+"%"
document.getElementById("status").innerText=t

}

document.getElementById("submitBtn").addEventListener("click",async()=>{

const jd=document.getElementById("job_description").files[0]
const resumes=document.getElementById("resume").files

if(!jd || resumes.length===0){

alert("Upload JD and resumes")
return

}

let seconds=0

const timer=setInterval(()=>{

seconds++
document.getElementById("timer").innerText=seconds

},1000)


updateProgress(20,"Uploading resumes")

const formData=new FormData()

formData.append("job_description",jd)

for(let i=0;i<resumes.length;i++){

formData.append("resume",resumes[i])

}

updateProgress(50,"AI analyzing resumes")

const response=await fetch(
"https://suezppl.app.n8n.cloud/webhook/9fdb5c11-569d-4f29-acd2-db49248a700c",
{
method:"POST",
body:formData
})

let data=await response.json()

updateProgress(80,"Generating ranking")

clearInterval(timer)

if(!Array.isArray(data)){
data=[data]
}

data.forEach(c=>{

c.score=Math.round((c["Similarity"]||0)*100)

})

data.sort((a,b)=>b.score-a.score)

tableData=data

renderTable(data)

drawChart(data)

updateProgress(100,"Completed")

})

function renderTable(data){

let table=`<table>

<tr>
<th>Rank</th>
<th>Name</th>
<th>Score</th>
<th>Education</th>
<th>Current Company</th>
<th>Designation</th>
<th>Experience</th>
<th>Skills</th>
</tr>
`

data.forEach((c,i)=>{

table+=`<tr class="${i==0?'topCandidate':''}">

<td>${i+1}</td>
<td>${c["Name"]||""}</td>
<td>${c.score}%</td>
<td>${c["Education"]||""}</td>
<td>${c["Current Company"]||""}</td>
<td>${c["Current Designation"]||""}</td>
<td>${c["Total Working Experience"]||""}</td>
<td>${c["Key Skills"]||""}</td>

</tr>`

})

table+="</table>"

document.getElementById("result").innerHTML=table

}


function drawChart(data){

let names=data.map(x=>x.Name)
let scores=data.map(x=>x.score)

new Chart(document.getElementById("chart"),{

type:"bar",

data:{

labels:names,

datasets:[{

label:"Candidate Score",

data:scores,

backgroundColor:"#2c7be5"

}]

}

})

}


function downloadExcel(){

const worksheet=XLSX.utils.json_to_sheet(tableData)

const workbook=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(workbook,worksheet,"Candidates")

XLSX.writeFile(workbook,"Candidate_AI_Screening.xlsx")

}

</script>

</body>

</html>
